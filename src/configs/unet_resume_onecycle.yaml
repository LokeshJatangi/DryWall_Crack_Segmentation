data:
  train_pkl: processed_data/merged/train/merged_train.pkl
  val_pkl: processed_data/merged/valid/merged_valid.pkl
  batch_size: 32
  num_workers: 4
  augmentation_tier: 'full'

model:
  arch: 'Unet'
  encoder: 'resnet34'
  num_prompts: 2
  embed_dim: 128

training:
  epochs: 30
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: 'onecycle'
  early_stopping_patience: 15
  seed: 24
  resume_from: 'experiments/unet_resnet34_baseline_20260315_132337/ckpts/best_model.pt'

loss:
  type: 'dice_bce'
  dice_weight: 0.5
  bce_weight: 0.5

output:
  exp_name: 'unet_resnet34_onecycle_resume'
